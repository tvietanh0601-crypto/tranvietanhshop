<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Shop Acc - TranvietanhShop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f4f7f6; }
        .sidebar { width: 250px; height: 100vh; background: #212529; color: white; padding: 20px; position: fixed; }
        .sidebar h2 { cursor: pointer; text-align: center; color: #007bff; }
        .sidebar p { padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 8px 0; }
        .sidebar p:hover { background: #3d444b; }
        .main { margin-left: 250px; padding: 20px; width: calc(100% - 250px); box-sizing: border-box; }
        .user-header { display: flex; justify-content: flex-end; margin-bottom: 30px; }
        .user-btn { background: white; padding: 8px 15px; border-radius: 50px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .acc-card { background: white; width: 400px; border-radius: 20px; overflow: hidden; margin: auto; text-align: center; padding-bottom: 30px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .price { color: #e74c3c; font-size: 2rem; font-weight: bold; margin: 15px 0; }
        .btn-buy { background: #28a745; color: white; border: none; padding: 15px 50px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .sold-out { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); align-items: center; justify-content: center; color: red; font-size: 2.5rem; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 onclick="location.href='trangchu.html'">VietAnh Shop</h2>
        <p onclick="location.href='trangchu.html'">🏠 Trang Chủ</p>
        <p style="background: #007bff; color: white;">⚔️ Acc Blox Fruit</p>
        <p onclick="location.href='naptien.html'">💳 Nạp Thẻ Cào</p>
    </div>

    <div class="main">
        <div class="user-header">
            <div class="user-btn">
                <img src="https://i.imgur.com/v6SQUC9.png" width="35" style="border-radius:50%; margin-right:10px;">
                <div>
                    <span id="userNameHeader" style="font-weight:bold; display:block;">Sếp VietAnh</span>
                    <span id="userBalance" style="color:#e74c3c; font-size:0.8rem; font-weight: bold;">0 đ</span>
                </div>
            </div>
        </div>

        <div class="acc-card">
            <div id="soldTag" class="sold-out">ĐÃ BÁN</div>
            <img src="https://via.placeholder.com/400x230?text=Blox+Fruit+VIP+Max" width="100%">
            <div style="padding: 20px;">
                <h3>Siêu Phẩm: LV MAX + GODHUMAN + V4</h3>
                <p>✅ CDK | ✅ Soul Guitar | ✅ Tộc V4 1 Gear</p>
                <div class="price">150,000 đ</div>
                <button class="btn-buy" id="buyBtn" onclick="buyAcc(150000)">MUA NGAY</button>
            </div>
        </div>
    </div>

    <script>
        // KIỂM TRA TIỀN & TRẠNG THÁI
        async function checkData() {
            const user = localStorage.getItem("currentUser");
            document.getElementById("userNameHeader").innerText = user;

            // 1. Check xem acc đã bán chưa
            if(localStorage.getItem("acc_sold") === "true") {
                document.getElementById("soldTag").style.display = "flex";
                document.getElementById("buyBtn").style.display = "none";
            }

            // 2. Check tiền từ Sheets
            try {
                const res = await fetch("https://sheetdb.io/api/v1/5z2eiykkd64i9");
                const data = await res.json();
                const danhSachDuyet = data.filter(item => item.username === user && item.status === "Đã duyệt");
                let tongTien = 0;
                danhSachDuyet.forEach(the => tongTien += parseInt(the.menhGia));
                localStorage.setItem("userBalance", tongTien);
                document.getElementById("userBalance").innerText = tongTien.toLocaleString() + " đ";
            } catch (e) { }
        }

        async function buyAcc(gia) {
            let balance = parseInt(localStorage.getItem("userBalance") || 0);
            if(balance < gia) return alert("Sếp ơi thiếu tiền rồi! Nạp thêm thẻ đi sếp.");

            if(confirm("Chốt đơn 150k nhé sếp?")) {
                alert("MUA THÀNH CÔNG! Tài khoản: MaryCurtis932 / Mật khẩu: TVA627777227");
                localStorage.setItem("acc_sold", "true");
                location.reload();
            }
        }
        checkData();
    </script>
</body>
</html>
