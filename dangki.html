<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký - TranvietanhShop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        a { color: #007bff; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Tạo Tài Khoản</h2>
        <input type="text" id="regUser" placeholder="Tên đăng nhập">
        <input type="password" id="regPass" placeholder="Mật khẩu">
        <button onclick="register()">Đăng Ký Ngay</button>
        <p><a href="dangnhap.html">Đã có tài khoản? Đăng nhập</a></p>
    </div>

    <script>
        function register() {
            const u = document.getElementById("regUser").value.trim();
            const p = document.getElementById("regPass").value.trim();
            if(!u || !p) return alert("Nhập đủ thông tin cậu ơi!");

            let users = JSON.parse(localStorage.getItem("users")) || [];
            if(users.some(user => user.username === u)) return alert("Tên này có người dùng rồi!");

            // Tự động tạo ID 4 số ngẫu nhiên
            const randomId = Math.floor(1000 + Math.random() * 9000);

            users.push({ username: u, password: p, userId: randomId });
            localStorage.setItem("users", JSON.stringify(users));
            alert("Đăng ký thành công! ID của cậu là: #" + randomId);
            window.location.href = "dangnhap.html";
        }
    </script>
</body>
</html>
