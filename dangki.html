<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký - TranvietanhShop</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 10px; shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Đăng Ký</h2>
        <input type="text" id="regUser" placeholder="Tên đăng nhập">
        <input type="password" id="regPass" placeholder="Mật khẩu">
        <button onclick="register()">Đăng Ký</button>
        <p><a href="dangnhap.html">Đã có tài khoản? Đăng nhập</a></p>
    </div>

    <script>
        function register() {
            const u = document.getElementById("regUser").value.trim();
            const p = document.getElementById("regPass").value.trim();
            if(!u || !p) return alert("Vui lòng nhập đủ thông tin!");

            let users = JSON.parse(localStorage.getItem("users")) || [];
            if(users.some(user => user.username === u)) return alert("Tên này có người dùng rồi cậu ơi!");

            // TẠO ID NGẪU NHIÊN 6 SỐ
            const randomId = Math.floor(100000 + Math.random() * 900000);

            users.push({ username: u, password: p, userId: randomId });
            localStorage.setItem("users", JSON.stringify(users));
            alert("Đăng ký thành công! ID của cậu là: #" + randomId);
            window.location.href = "dangnhap.html";
        }
    </script>
</body>
</html>
