<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nạp Robux - VietAnh Shop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f4f7f6; }
        .sidebar { width: 250px; height: 100vh; background: #212529; color: white; padding: 20px; position: fixed; }
        .sidebar h2 { cursor: pointer; text-align: center; color: #007bff; }
        .sidebar p { padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 8px 0; }
        .sidebar p:hover { background: #3d444b; }
        .main { margin-left: 250px; padding: 20px; width: calc(100% - 250px); box-sizing: border-box; }
        .user-header { display: flex; justify-content: flex-end; margin-bottom: 30px; }
        .user-btn { background: white; padding: 5px 15px; border-radius: 50px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .robux-container { background: white; padding: 30px; border-radius: 20px; max-width: 600px; margin: auto; text-align: center; }
        .package-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .package { border: 2px solid #eee; padding: 15px; border-radius: 15px; cursor: pointer; }
        .package.active { border-color: #007bff; background: #f0f7ff; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 onclick="location.href='trangchu.html'">VietAnh Shop</h2>
        <p onclick="location.href='trangchu.html'">🏠 Trang Chủ</p>
        <p onclick="location.href='acc-blox-fruit.html'">⚔️ Acc Blox Fruit</p>
        <p style="background: #007bff; color: white;">💎 Nạp Robux</p>
        <p onclick="location.href='naptien.html'">💳 Nạp Thẻ Cào</p>
    </div>
    <div class="main">
        <div class="user-header">
            <div class="user-btn">
                <img src="https://i.imgur.com/v6SQUC9.png" width="35" style="border-radius:50%; margin-right:10px;">
                <div><span id="userNameHeader" style="font-weight:bold; display:block;">Sếp</span><span id="userBalance" style="color:#e74c3c; font-size:0.8rem; font-weight: bold;">0 đ</span></div>
            </div>
        </div>
        <div class="robux-container">
            <h2>MUA ROBUX</h2>
            <div class="package-list">
                <div class="package" onclick="selectPkg(this, 80, 20000)"><h4>80 Robux</h4><p>20,000 đ</p></div>
                <div class="package" onclick="selectPkg(this, 400, 100000)"><h4>400 Robux</h4><p>100,000 đ</p></div>
            </div>
            <input type="text" id="robloxUser" placeholder="Tên nhân vật Roblox" style="width:100%; padding:12px; margin:20px 0; border-radius:8px; border:1px solid #ddd;">
            <button onclick="buyRobux()" style="width:100%; padding:15px; background:#ffc107; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">MUA NGAY</button>
        </div>
    </div>
    <script>
        let selectedPrice = 0, selectedAmount = 0;
        function selectPkg(el, amount, price) { document.querySelectorAll('.package').forEach(p => p.classList.remove('active')); el.classList.add('active'); selectedAmount = amount; selectedPrice = price; }
        async function checkStatus() {
            const user = localStorage.getItem("currentUser");
            document.getElementById("userNameHeader").innerText = user;
            try {
                // THAY API CỦA SẾP TẠI ĐÂY
                const response = await fetch("https://sheetdb.io/api/v1/ipb6o50vzg1xu");
                const data = await response.json();
                const list = data.filter(i => i.username.trim() === user.trim() && i.status.trim().toLowerCase() === "đã duyệt");
                let tong = 0; list.forEach(t => tong += parseInt(t.menhGia || 0));
                document.getElementById("userBalance").innerText = tong.toLocaleString() + " đ";
                localStorage.setItem("userBalance", tong);
            } catch (e) { }
        }
        async function buyRobux() {
            const rUser = document.getElementById("robloxUser").value;
            const user = localStorage.getItem("currentUser");
            let bal = parseInt(localStorage.getItem("userBalance") || 0);
            if (!selectedAmount || !rUser || bal < selectedPrice) return alert("Kiểm tra lại thông tin hoặc số dư!");
            if (confirm("Mua Robux?")) {
                const order = { data: [{ username: user, nhaMang: "MUA_ROBUX", menhGia: "-" + selectedPrice, seri: rUser, maNap: selectedAmount + " Robux", status: "Chờ duyệt", ngayNap: new Date().toLocaleString() }] };
                await fetch("https://sheetdb.io/api/v1/5z2eiykkd64i9", { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(order) });
                alert("Đã gửi đơn!"); location.reload();
            }
        }
        checkStatus();
    </script>
</body>
</html>
