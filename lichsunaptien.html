<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Nạp - VietAnh Shop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #1a1a1a; color: #fff; }
        .sidebar { width: 260px; height: 100vh; background: #111; padding: 25px; position: fixed; }
        .sidebar h2 { color: #007bff; text-align: center; margin-bottom: 40px; }
        .sidebar p { padding: 14px; border-radius: 10px; cursor: pointer; transition: 0.3s; margin: 10px 0; }
        .sidebar p:hover { background: #007bff; }
        .main { margin-left: 310px; padding: 40px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #222; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #28a745; color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>VIETANH SHOP</h2>
        <p onclick="location.href='trangchu.html'">🏠 Trang Chủ</p>
        <p onclick="location.href='acc-blox-fruit.html'">⚔️ Túi Mù Blox Fruit</p>
        <p onclick="location.href='lichsumuaacc.html'">📜 Lịch Sử Mua Acc</p>
        <p onclick="location.href='naptien.html'">💳 Nạp Thẻ Cào</p>
        <p style="background: #007bff; color: white;">📝 Lịch Sử Nạp</p>
    </div>
    <div class="main">
        <h2>📝 LỊCH SỬ NẠP THẺ CỦA SẾP</h2>
        <table>
            <thead>
                <tr>
                    <th>Ngày Nạp</th>
                    <th>Nhà Mạng</th>
                    <th>Mệnh Giá</th>
                    <th>Trạng Thái</th>
                </tr>
            </thead>
            <tbody id="cardTable">
                <tr><td colspan="4" style="text-align:center;">Đang tải danh sách thẻ...</td></tr>
            </tbody>
        </table>
    </div>
    <script>
        async function loadCards() {
            const user = localStorage.getItem("currentUser") || "DoraemonStudio01";
            try {
                const res = await fetch("https://sheetdb.io/api/v1/ipb6o50vzg1xu?sheet=LichSuNap");
                const data = await res.json();
                const myCards = data.filter(i => i.username.trim() === user.trim() && i.nhaMang !== "MUA_TUIMU");
                
                let html = "";
                if(myCards.length === 0) {
                    html = "<tr><td colspan='4' style='text-align:center;'>Sếp chưa nạp cái thẻ nào vào đây luôn!</td></tr>";
                } else {
                    myCards.forEach(item => {
                        let color = item.status === "Đã duyệt" ? "#2ed573" : "#ffb900";
                        html += `<tr><td>${item.ngayNap}</td><td>${item.nhaMang}</td><td>${parseInt(item.menhGia).toLocaleString()} đ</td><td style="color:${color}; font-weight:bold;">${item.status}</td></tr>`;
                    });
                }
                document.getElementById("cardTable").innerHTML = html;
            } catch(e){}
        }
        loadCards();
    </script>
</body>
</html>
