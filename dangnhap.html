<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - TranvietanhShop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        a { color: #007bff; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Đăng Nhập</h2>
        <input type="text" id="user" placeholder="Tên đăng nhập">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button onclick="login()">Đăng Nhập</button>
        <p><a href="dangki.html">Chưa có tài khoản? Đăng ký</a></p>
    </div>

    <script>
        function login() {
            const u = document.getElementById("user").value.trim();
            const p = document.getElementById("pass").value.trim();
            let users = JSON.parse(localStorage.getItem("users")) || [];
            let found = users.find(user => user.username === u && user.password === p);

            if (found) {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("currentUser", u);
                window.location.href = "trangchu.html";
            } else {
                alert("Sai tài khoản hoặc mật khẩu rồi!");
            }
        }
    </script>
</body>
</html>
