<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nạp Thẻ Cào - TranvietanhShop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f4f7f6; }
        .sidebar { width: 250px; height: 100vh; background: #212529; color: white; padding: 20px; position: fixed; }
        .main { margin-left: 250px; padding: 20px; width: calc(100% - 250px); box-sizing: border-box; }
        
        .nap-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        h2 { text-align: center; color: #333; }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .btn-nap { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1rem; }
        .btn-nap:disabled { background: #ccc; cursor: not-allowed; }

        /* Hiệu ứng chờ */
        #loadingArea { display: none; margin-top: 20px; text-align: center; padding: 20px; border: 2px dashed #007bff; border-radius: 10px; background: #f0f7ff; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 onclick="location.href='trangchu.html'">VietAnh Shop</h2>
        <p onclick="location.href='trangchu.html'">🏠 Trang Chủ</p>
        <p onclick="location.href='acc-blox-fruit.html'">⚔️ Acc Blox Fruit</p>
        <p style="background: #28a745; color: white;">💳 Nạp Thẻ Cào</p>
    </div>

    <div class="main">
        <div class="nap-container">
            <h2>HỆ THỐNG NẠP THẺ TỰ ĐỘNG</h2>
            
            <label>Chọn Nhà Mạng</label>
            <select id="nhaMang">
                <option value="Viettel">Viettel</option>
                <option value="Vinaphone">Vinaphone</option>
                <option value="Mobifone">Mobifone</option>
                <option value="Zing">Zing</option>
            </select>

            <label>Chọn Mệnh Giá</label>
            <select id="menhGia">
                <option value="10000">10,000đ</option>
                <option value="20000">20,000đ</option>
                <option value="50000">50,000đ</option>
                <option value="100000">100,000đ</option>
                <option value="200000">200,000đ</option>
                <option value="500000">500,000đ</option>
                <option value="1000000">1,000,000đ</option>
            </select>

            <label>Số Seri</label>
            <input type="text" id="seri" placeholder="Nhập số seri thẻ">

            <label>Mã Thẻ</label>
            <input type="text" id="maNap" placeholder="Nhập mã cào dưới lớp bạc">

            <button class="btn-nap" id="btnSubmit" onclick="xuLyNap()">NẠP TIỀN NGAY</button>

            <div id="loadingArea">
                <div class="spinner"></div>
                <p>Hệ thống đang kiểm tra thẻ... Vui lòng chờ <b><span id="countdown">30</span> giây</b>.</p>
                <p style="font-size: 0.8rem; color: #888;">Đừng tắt trang này nhé cậu!</p>
            </div>
        </div>
    </div>

    <script>
        function xuLyNap() {
            const seri = document.getElementById("seri").value;
            const ma = document.getElementById("maNap").value;
            if(!seri || !ma) return alert("Cậu nhập đủ Seri và Mã thẻ nhé!");

            // Hiện màn hình chờ
            document.getElementById("btnSubmit").disabled = true;
            document.getElementById("loadingArea").style.display = "block";
            
            let timeLeft = 30; // 30 giây chờ
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById("countdown").innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    hoanThanh();
                }
            }, 1000);
        }

        function hoanThanh() {
            alert("Nạp thẻ thành công! Tiền đã được cộng vào tài khoản của cậu.");
            // Ở level này tớ tạm thời alert, sau này mình sẽ cộng tiền thật vào file Excel/Sheets của cậu
            location.href = "trangchu.html";
        }
    </script>
</body>
</html>
