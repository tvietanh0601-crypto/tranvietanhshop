<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nạp Thẻ - TranvietanhShop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f4f7f6; }
        .sidebar { width: 250px; height: 100vh; background: #212529; color: white; padding: 20px; position: fixed; }
        .sidebar h2 { cursor: pointer; text-align: center; color: #007bff; }
        .sidebar p { padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 8px 0; }
        .sidebar p:hover { background: #3d444b; }
        .main { margin-left: 250px; padding: 20px; width: calc(100% - 250px); box-sizing: border-box; }
        .nap-box { background: white; padding: 30px; border-radius: 20px; max-width: 500px; margin: 50px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-nap { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #loading { display: none; text-align: center; margin-top: 15px; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 onclick="location.href='trangchu.html'">VietAnh Shop</h2>
        <p onclick="location.href='trangchu.html'">🏠 Trang Chủ</p>
        <p onclick="location.href='acc-blox-fruit.html'">⚔️ Acc Blox Fruit</p>
        <p style="background: #007bff; color: white;">💳 Nạp Thẻ Cào</p>
    </div>

    <div class="main">
        <div class="nap-box">
            <h2 style="text-align: center;">HỆ THỐNG NẠP THẺ</h2>
            <p style="font-size: 0.8rem; color: red; text-align: center;">* Vui lòng nhập đúng mệnh giá, sai sẽ bị mất thẻ!</p>
            <select id="nhaMang">
                <option value="Viettel">Viettel</option>
                <option value="Vinaphone">Vinaphone</option>
                <option value="Mobifone">Mobifone</option>
                <option value="Zing">Thẻ Zing</option>
            </select>
            <select id="menhGia">
                <option value="10000">10,000 đ</option>
                <option value="20000">20,000 đ</option>
                <option value="50000">50,000 đ</option>
                <option value="100000">100,000 đ</option>
                <option value="200000">20,000 đ</option>
                <option value="500000">500,000 đ</option>
            </select>
            <input type="text" id="seri" placeholder="Nhập số Seri">
            <input type="text" id="maNap" placeholder="Nhập mã thẻ">
            <button class="btn-nap" onclick="xuLyNap()">NẠP THẺ NGAY</button>
            <div id="loading">🔄 Đang gửi thẻ lên hệ thống...</div>
        </div>
    </div>

    <script>
        async function xuLyNap() {
            const user = localStorage.getItem("currentUser");
            const nhaMang = document.getElementById("nhaMang").value;
            const menhGia = document.getElementById("menhGia").value;
            const seri = document.getElementById("seri").value;
            const maNap = document.getElementById("maNap").value;

            if(!seri || !maNap) return alert("Nhập đủ thông tin sếp ơi!");

            document.getElementById("loading").style.display = "block";

            const dataSend = {
                data: [{
                    username: user,
                    nhaMang: nhaMang,
                    menhGia: menhGia,
                    seri: seri,
                    maNap: maNap,
                    status: "Chờ duyệt",
                    ngayNap: new Date().toLocaleString()
                }]
            };

            try {
                // SẾP THAY LINK API CỦA SẾP VÀO ĐÂY
                await fetch("https://sheetdb.io/api/v1/5z2eiykkd64i9", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataSend)
                });
                alert("Đã gửi thẻ! Đợi sếp duyệt là có tiền ngay.");
                location.href = "trangchu.html";
            } catch (e) {
                alert("Lỗi rồi sếp!");
            }
        }
    </script>
</body>
</html>
