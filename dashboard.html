<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tài Khoản - TranvietanhShop</title>
    <style>
        /* Giao diện đồng bộ với trang chủ */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f4f7f6; height: 100vh; }
        
        .sidebar { width: 250px; background: #212529; color: white; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { text-align: center; cursor: pointer; margin-bottom: 30px; }
        .sidebar p { padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 8px 0; display: flex; align-items: center; }
        .sidebar p:hover { background: #3d444b; color: #007bff; }

        .main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .auth-container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 25px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem;
        }

        .btn { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem; 
            transition: 0.3s; 
            margin-top: 10px;
        }
        .btn-blue { background: #007bff; color: white; }
        .btn-blue:hover { background: #0056b3; }
        
        .toggle-link { color: #007bff; cursor: pointer; margin-top: 15px; display: block; font-size: 0.9rem; }
        
        /* Hiệu ứng khi đang tải */
        .loading { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 onclick="location.href='trangchu.html'">TranvietanhShop</h2>
        <p onclick="location.href='trangchu.html'">🏠 Trang Chủ</p>
        <p onclick="location.href='acc-blox-fruit.html'">⚔️ Acc Blox Fruit</p>
        <p onclick="location.href='robux.html'">💎 Mua Robux</p>
        <hr style="border-color: #444; margin: 20px 0;">
        <p onclick="window.open('https://zalo.me/0886272568', '_blank')">💬 Liên Hệ Admin</p>
    </div>

    <div class="main">
        <div id="loginForm" class="auth-container">
            <h2>Đăng Nhập</h2>
            <input type="text" id="loginUser" placeholder="Tên tài khoản">
            <input type="password" id="loginPass" placeholder="Mật khẩu">
            <button class="btn btn-blue" id="btnLogin" onclick="handleLogin()">Vào Shop</button>
            <span class="toggle-link" onclick="toggleAuth()">Chưa có tài khoản? Đăng ký ngay</span>
        </div>

        <div id="registerForm" class="auth-container" style="display: none;">
            <h2>Đăng Ký Thành Viên</h2>
            <input type="text" id="regUser" placeholder="Tên tài khoản mới">
            <input type="password" id="regPass" placeholder="Mật khẩu">
            <button class="btn btn-blue" id="btnReg" onclick="handleRegister()">Tạo Tài Khoản</button>
            <span class="toggle-link" onclick="toggleAuth()">Đã có tài khoản? Đăng nhập</span>
        </div>
    </div>

    <script>
        // Link API SheetDB của cậu đã được gắn vào đây
        const API_URL = "https://sheetdb.io/api/v1/ipb6o50vzg1xu";

        function toggleAuth() {
            const login = document.getElementById("loginForm");
            const reg = document.getElementById("registerForm");
            if (login.style.display === "none") {
                login.style.display = "block";
                reg.style.display = "none";
            } else {
                login.style.display = "none";
                reg.style.display = "block";
            }
        }

        // XỬ LÝ ĐĂNG KÝ (Lưu vào Google Sheets)
        async function handleRegister() {
            const user = document.getElementById("regUser").value;
            const pass = document.getElementById("regPass").value;
            const btn = document.getElementById("btnReg");

            if (!user || !pass) return alert("Cậu điền đầy đủ tên và mật khẩu nhé!");

            btn.innerText = "Đang xử lý...";
            btn.classList.add("loading");

            try {
                // Tạo ID ngẫu nhiên cho thành viên
                const randomId = Math.floor(Math.random() * 8999) + 1000;

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        data: [{ username: user, password: pass, userId: randomId }]
                    })
                });

                if (response.ok) {
                    alert("Đăng ký thành công! Giờ cậu có thể đăng nhập ở bất cứ đâu.");
                    toggleAuth();
                } else {
                    alert("Lỗi hệ thống, cậu thử lại sau nhé!");
                }
            } catch (error) {
                alert("Không thể kết nối với Google Sheets!");
            } finally {
                btn.innerText = "Tạo Tài Khoản";
                btn.classList.remove("loading");
            }
        }

        // XỬ LÝ ĐĂNG NHẬP (Kiểm tra từ Google Sheets)
        async function handleLogin() {
            const user = document.getElementById("loginUser").value;
            const pass = document.getElementById("loginPass").value;
            const btn = document.getElementById("btnLogin");

            if (!user || !pass) return alert("Cậu quên nhập tên hoặc mật khẩu kìa!");

            btn.innerText = "Đang kiểm tra...";
            btn.classList.add("loading");

            try {
                // Tìm kiếm tài khoản trong Google Sheets thông qua API
                const response = await fetch(`${API_URL}/search?username=${user}`);
                const data = await response.json();

                if (data.length > 0) {
                    // Nếu tìm thấy username, kiểm tra mật khẩu
                    const foundUser = data.find(u => u.username === user && u.password === pass);
                    
                    if (foundUser) {
                        // Lưu thông tin đăng nhập vào LocalStorage để trang chủ hiển thị
                        localStorage.setItem("isLoggedIn", "true");
                        localStorage.setItem("currentUser", foundUser.username);
                        
                        // Đồng bộ danh sách người dùng tạm thời cho trang chủ hiện ID
                        localStorage.setItem("users", JSON.stringify([foundUser]));
                        
                        alert("Chào mừng cậu đến với TranvietanhShop!");
                        location.href = "trangchu.html";
                    } else {
                        alert("Mật khẩu không đúng rồi cậu ơi!");
                    }
                } else {
                    alert("Tài khoản này không tồn tại trên hệ thống!");
                }
            } catch (error) {
                alert("Lỗi khi tải dữ liệu từ Google Sheets!");
            } finally {
                btn.innerText = "Vào Shop";
                btn.classList.remove("loading");
            }
        }
    </script>
</body>
</html>
