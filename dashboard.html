<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - TranvietanhShop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f4f7f6; height: 100vh; }
        .sidebar { width: 250px; background: #212529; color: white; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { text-align: center; cursor: pointer; margin-bottom: 30px; }
        .sidebar p { padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 8px 0; }
        .sidebar p:hover { background: #3d444b; color: #007bff; }

        .main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .auth-container { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;
        }
        h2 { color: #333; margin-bottom: 25px; }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem;
        }
        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; 
            cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; margin-top: 10px;
        }
        .btn-blue { background: #007bff; color: white; }
        .btn-blue:hover { background: #0056b3; }
        .btn-zalo { background: #0068ff; color: white; margin-top: 20px; text-decoration: none; display: inline-block; width: 88%; }

        .contact-box { 
            margin-top: 25px; padding-top: 20px; border-top: 1px dashed #ccc;
        }
        .contact-box p { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 onclick="location.href='trangchu.html'">TranvietanhShop</h2>
        <p onclick="location.href='trangchu.html'">🏠 Trang Chủ</p>
        <p onclick="location.href='acc-blox-fruit.html'">⚔️ Acc Blox Fruit</p>
        <p onclick="location.href='robux.html'">💎 Mua Robux</p>
    </div>

    <div class="main">
        <div class="auth-container">
            <h2>Đăng Nhập Shop</h2>
            <input type="text" id="loginUser" placeholder="Tên tài khoản">
            <input type="password" id="loginPass" placeholder="Mật khẩu">
            <button class="btn btn-blue" id="btnLogin" onclick="handleLogin()">Vào Shop Ngay</button>

            <div class="contact-box">
                <p>Chưa có tài khoản?</p>
                <a href="https://zalo.me/0886272568" target="_blank" class="btn btn-zalo">
                    💬 Nhắn Zalo Admin để tạo Acc
                </a>
                <p style="font-size: 0.75rem; margin-top: 10px; color: #999;">(Tài khoản sẽ được cấp sau 1-5 phút)</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/ipb6o50vzg1xu";

        async function handleLogin() {
            const user = document.getElementById("loginUser").value;
            const pass = document.getElementById("loginPass").value;
            const btn = document.getElementById("btnLogin");

            if (!user || !pass) return alert("Nhập đủ thông tin đã cậu ơi!");

            btn.innerText = "Đang kiểm tra...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/search?username=${user}`);
                const data = await response.json();

                if (data.length > 0) {
                    const foundUser = data.find(u => u.username === user && u.password === pass);
                    if (foundUser) {
                        localStorage.setItem("isLoggedIn", "true");
                        localStorage.setItem("currentUser", foundUser.username);
                        localStorage.setItem("users", JSON.stringify([foundUser]));
                        alert("Chào mừng cậu đến với TranvietanhShop!");
                        location.href = "trangchu.html";
                    } else {
                        alert("Mật khẩu bị sai rồi!");
                    }
                } else {
                    alert("Tài khoản không tồn tại! Nhắn Zalo cho Admin bên dưới để tạo nhé.");
                }
            } catch (error) {
                alert("Lỗi kết nối dữ liệu!");
            } finally {
                btn.innerText = "Vào Shop Ngay";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
