<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - TranvietanhShop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: #f4f7f6; height: 100vh; }
        .sidebar { width: 250px; background: #212529; color: white; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { text-align: center; cursor: pointer; }
        .sidebar p { padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin: 8px 0; }
        .sidebar p:hover { background: #3d444b; color: #007bff; }
        .main { flex: 1; display: flex; justify-content: center; align-items: center; }
        .auth-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #007bff; color: white; transition: 0.3s; }
        .btn:hover { background: #0056b3; }
        .toggle-link { color: #007bff; cursor: pointer; font-size: 0.9rem; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 onclick="location.href='trangchu.html'">TranvietanhShop</h2>
        <p onclick="location.href='trangchu.html'">🏠 Trang Chủ</p>
        <p onclick="location.href='acc-blox-fruit.html'">⚔️ Acc Blox Fruit</p>
    </div>

    <div class="main">
        <div id="loginForm" class="auth-container">
            <h2>Đăng Nhập</h2>
            <input type="text" id="user" placeholder="Tên tài khoản">
            <input type="password" id="pass" placeholder="Mật khẩu">
            <button class="btn" onclick="login()">Vào Shop</button>
            <span class="toggle-link" onclick="toggleAuth(true)">Chưa có tài khoản? Đăng ký ngay</span>
        </div>

        <div id="registerForm" class="auth-container" style="display:none;">
            <h2>Đăng Ký</h2>
            <input type="text" id="regUser" placeholder="Tên tài khoản mới">
            <input type="password" id="regPass" placeholder="Mật khẩu">
            <button class="btn" style="background:#28a745;" onclick="register()">Tạo Tài Khoản</button>
            <span class="toggle-link" onclick="toggleAuth(false)">Đã có tài khoản? Đăng nhập</span>
        </div>
    </div>

    <script>
        const API_URL = "https://sheetdb.io/api/v1/ipb6o50vzg1xu";

        function toggleAuth(isReg) {
            document.getElementById('loginForm').style.display = isReg ? 'none' : 'block';
            document.getElementById('registerForm').style.display = isReg ? 'block' : 'none';
        }

        async function register() {
            const user = document.getElementById("regUser").value;
            const pass = document.getElementById("regPass").value;
            const randomId = Math.floor(1000 + Math.random() * 9000);
            if(!user || !pass) return alert("Điền đủ giúp tớ nhé!");

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ data: [{ username: user, password: pass, userId: randomId }] })
                });
                if(res.ok) {
                    alert("Đăng ký xong rồi! Giờ cậu đăng nhập đi.");
                    toggleAuth(false);
                }
            } catch(e) { alert("Lỗi rồi sếp ơi!"); }
        }

        async function login() {
            const user = document.getElementById("user").value;
            const pass = document.getElementById("pass").value;
            try {
                const res = await fetch(`${API_URL}/search?username=${user}`);
                const data = await res.json();
                const found = data.find(u => u.username === user && u.password === pass);
                if(found) {
                    localStorage.setItem("isLoggedIn", "true");
                    localStorage.setItem("currentUser", found.username);
                    localStorage.setItem("users", JSON.stringify([found]));
                    location.href = "trangchu.html";
                } else { alert("Sai thông tin rồi!"); }
            } catch(e) { alert("Lỗi kết nối!"); }
        }
    </script>
</body>
</html>
